tabs:
  general:
    display: 'General'
    sections:
      -
        display: 'Subscriber'
        fields:
          -
            handle: email_field
            field:
              display: 'Email Field'
              instructions: 'The form field that contains the email of the subscriber.'
              type: statamic_form_fields
              validate: 'required'
              localizable: true
              width: 50
          -
            handle: consent_field
            field:
              display: 'Consent Field'
              instructions: 'The form field that contains the consent of the subscriber.'
              type: statamic_form_fields
              localizable: true
              width: 50
      -
        display: 'Lists'
        fields:
          -
            handle: list_mode
            field:
              display: 'List Mode'
              instructions: 'How subscribers are added to lists.'
              type: button_group
              default: always
              validate: 'required'
              localizable: true
              options:
                always: 'Always'
                conditional: 'Conditional'
                both: 'Both'
          -
            handle: list_ids
            field:
              display: 'Lists'
              instructions: 'The ActiveCampaign lists all subscribers are added to.'
              type: activecampaign_list
              validate: 'required_if:list_mode,always,both'
              localizable: true
              if:
                list_mode: 'contains_any always, both'
          -
            handle: list_fields
            field:
              display: 'Conditional Lists'
              instructions: 'Map form fields to ActiveCampaign lists. For multi-option fields (checkboxes, radio, select), select the option to match. For toggle fields, leave the option empty.'
              type: grid
              mode: stacked
              listable: hidden
              fullscreen: false
              localizable: true
              validate: 'required_if:list_mode,conditional,both'
              add_row: 'Add List Mapping'
              if:
                list_mode: 'contains_any conditional, both'
              fields:
                -
                  handle: form_field
                  field:
                    display: 'Form Field'
                    type: statamic_form_fields
                    validate: required
                    width: 50
                -
                  handle: form_option
                  field:
                    display: 'Option'
                    type: statamic_form_field_options
                    width: 50
                -
                  handle: activecampaign_list_id
                  field:
                    display: 'ActiveCampaign List'
                    type: activecampaign_list
                    mode: select
                    max_items: 1
                    validate: required
                    width: 100
          -
            handle: tag_ids
            field:
              display: 'Tags'
              instructions: 'The ActiveCampaign tags you want to add to the subscriber.'
              type: activecampaign_tag
              localizable: true
      -
        display: 'Field Mapping'
        fields:
          -
            handle: merge_fields
            field:
              display: 'Merge Fields'
              instructions: 'Add the form fields you want to map to ActiveCampaign fields.'
              type: grid
              mode: table
              listable: hidden
              fullscreen: false
              localizable: true
              width: 100
              add_row: 'Add Merge Field'
              fields:
                -
                  handle: statamic_field
                  field:
                    display: Form Field
                    type: statamic_form_fields
                    validate: required
                -
                  handle: activecampaign_field
                  field:
                    display: 'Merge Field'
                    type: activecampaign_merge_fields
                    validate: required
